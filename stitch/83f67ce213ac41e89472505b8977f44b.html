<!DOCTYPE html>

<body class="bg-background text-on-background font-body min-h-screen antialiased flex flex-col">
<!-- Mock Background Content (Blurred out) -->
<div class="fixed inset-0 z-0 bg-surface blur-sm opacity-50 flex items-center justify-center pointer-events-none">
<div class="w-full max-w-4xl p-8 grid gap-8">
<div class="h-64 bg-surface-container rounded-xl w-full"></div>
<div class="grid grid-cols-2 gap-8">
<div class="h-48 bg-surface-container rounded-xl"></div>
<div class="h-48 bg-surface-container rounded-xl"></div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-surface-container-lowest/80 backdrop-blur-md">
<!-- Modal Container -->
<div class="w-full max-w-md bg-surface-container-low rounded-[16px] shadow-[0_24px_48px_-12px_rgba(6,14,32,0.4)] relative overflow-hidden ring-1 ring-outline-variant/20">
<!-- Modal Header -->
<div class="p-6 pb-0 flex flex-col items-center text-center space-y-4">
<div class="w-16 h-16 rounded-full bg-error-container/20 flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-error text-4xl" data-icon="error" style="font-variation-settings: 'FILL' 1;">error</span>
</div>
<h2 class="text-[1.5rem] leading-[1.2] font-headline font-bold text-on-surface tracking-tight">
                    Tüm Verileri Sil
                </h2>
</div>
<!-- Modal Body -->
<div class="p-6 text-center">
<p class="text-[0.875rem] leading-[1.5] text-on-surface-variant font-body px-4">
                    Sayacı, notları ve geçmişi kalıcı olarak silmek istediğinize emin misiniz? Bu işlem geri alınamaz.
                </p>
</div>
<!-- Modal Footer (Actions) -->
<div class="p-6 pt-2 flex flex-col-reverse sm:flex-row gap-3 sm:gap-4 justify-center">
<button class="w-full sm:w-auto px-6 py-3 rounded-lg font-label text-[0.875rem] font-medium text-primary bg-transparent hover:bg-surface-bright/50 transition-colors duration-200">
                    İptal
                </button>
<button class="w-full sm:w-auto px-6 py-3 rounded-lg font-label text-[0.875rem] font-medium text-on-error bg-error hover:brightness-105 transition-all duration-200 shadow-sm flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="delete" style="font-variation-settings: 'FILL' 1;">delete</span>
                    Sil
                </button>
</div>
<!-- Bottom decorative accent -->
<div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-error/0 via-error to-error/0 opacity-50"></div>
</div>
</div>
